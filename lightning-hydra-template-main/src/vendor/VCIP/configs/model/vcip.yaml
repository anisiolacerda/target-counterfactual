# @package _global_
model:
  _target_: src.models.vae_model.VAEModel
  name: VCIP
  z_dim: 16
  auxiliary:
    _target_: src.models.auxiliary_model.AuxiliaryModel
    hidden_dim: 16
    num_layers: 2
    hiddens_G_y:
    - 16
    - 16
    hiddens_G_x:
    - 16
    - 16
    lr: 0.001
  inference:
    _target_: src.models.inference_model.InferenceModel
    hidden_dim: 16
    num_layers: 2
    hiddens_F_mu:
    - 16
    # - 16
    hiddens_F_logvar:
    - 16
    # - 16
    predict_y_history:
    - 16
    # - 16
    do: True
  generative:
    _target_: src.models.generative_model.GenerativeModel
    entropy_lambda: 1
    hidden_dim: 16
    treatment_hidden_dim: 16
    num_layers: 2
    hiddens_F_mu:
    - 16
    # - 16
    hiddens_F_logvar:
    - 16
    # - 16
    hiddens_decoder:
    - 16
    # - 16
    hidden_action_decoder:
    - 16
    # - 16
    hidden_action_decoder_step:
    - 16
    # - 16
  lr: 0.001
exp:
  seed: 10
  batch_size: 512
  batch_size_val: 128
  num_samples: 10
  dropout: 0.2
  epochs: 100
  patience: 20
  lr: 0.01
  weight_decay: 1.0e-05
  lambda_X: 0.1
  lambda_Y: 1
  load_best: true
  val: true
  weights_ema: true
  tau: 6
  repeats: 5
  lambda_step: 0.1
  lambda_kl: 1
  lambda_reg: 1
  lambda_action: 1
  lambda_hy: 1
  beta_bound: -10
  # VCI-inspired enhancements (Wu et al., ICLR 2025)
  # lambda_intermediate: 0.5  # Weight for intermediate timestep reconstruction loss (0.0 = terminal-only, original behavior)
  # lambda_terminal: 1.0      # Weight for terminal timestep reconstruction loss
  # lambda_disent: 0.1        # Weight for latent disentanglement regularizer DKL[q(Z|a_obs)||q(Z|a_alt)]
  # Reach-avoid scoring (Phase 0). Pass via CLI with + prefix: +exp.reach_avoid.target_upper=3.0
  # Option A thresholds (calibrated from simulated volume distribution at t=20-25):
  # reach_avoid:
  #   target_upper: 3.0           # ~p75 cancer volume at eval time (diam ~1.8cm)
  #   safety_volume_upper: 12.0   # ~p95 cancer volume (diam ~2.8cm)
  #   safety_chemo_upper: 5.0     # ~p95 cumulative chemo dosage
  #   kappa: 10.0                 # sigmoid hardness for soft indicators
